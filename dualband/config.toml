# ============================================================
#  Echo-Alverca — MeshCore Dual-Band Bot Configuration
# ============================================================

[general]
bot_name = "Echo-Alverca"
location = "LI.VFX Alverca"
monitor_channels = ["QSO", "ping", "testes", "lisboa"]
cross_band_grace_seconds = 8

# ============================================================
#  BANDS
# ============================================================

[[bands]]
name  = "433"
label = "433 MHz"
port  = "/dev/ttyUSB0"

[[bands]]
name  = "868"
label = "868 MHz"
port  = "/dev/ttyUSB1"

# ============================================================
#  RESPONSE TEMPLATES
# ============================================================

[responses]
ping = "@[{sender}] Aterrou em Alverca em [{first_band}] com {hops_label} via {path} "

# ============================================================
#  DASHBOARD
# ============================================================

[dashboard]
host = "0.0.0.0"
port = 8080

# ============================================================
#  DATABASE
# ============================================================

[database]
path = "./stats.db"
