# ============================================================
#  Echo-Alverca — MeshCore Dual-Band Bot Configuration
# ============================================================

[general]
node_name = "Echo-Alverca"
monitor_channels = ["QSO", "#ping", "#testes", "#lisboa"]
cross_band_grace_seconds = 8

# ============================================================
#  BANDS
# ============================================================

[[bands]]
name = "433MHz"
port = "/dev/ttyUSB0"
baud = 115200

[[bands]]
name = "868MHz"
port = "/dev/ttyUSB1"
baud = 115200

# ============================================================
#  RESPONSE TEMPLATES
# ============================================================

[responses]
ping      = "@[{sender}] Aterrou em Alverca {hops_label} {first_band} via {path}"
ping_dual = "@[{sender}] Aterrou em Alverca {hops_label} {first_band} via {path} | Bridge OK {second_band}"

# ============================================================
#  DASHBOARD
# ============================================================

[dashboard]
host = "0.0.0.0"
port = 8080

# ============================================================
#  DATABASE
# ============================================================

[database]
path = "./stats.db"
